<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolHunt - Cybersecurity Tool Search Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="security-icons" aria-hidden="true">
        <i class="fas fa-shield-alt"></i>
        <i class="fas fa-bug"></i>
        <i class="fas fa-lock"></i>
    </div>

    <div class="container">
        <header>
            <h1><i class="fas fa-search"></i> ToolHunt</h1>
            <p>Advanced Cybersecurity Arsenal Discovery Platform</p>
            <div class="cyber-badge">
                <i class="fas fa-terminal"></i> Penetration Testing • Digital Forensics • Security Analysis
            </div>
        </header>

        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" aria-label="Search for cybersecurity tools" placeholder="Enter attack vector, security domain, or tool functionality... e.g., 'sql injection scanner', 'network enumeration'">
                <button id="searchButton">
                    <i class="fas fa-crosshairs"></i> Hunt Tools
                </button>
            </div>
            <div class="examples">
                <button type="button" class="example-tag"><i class="fas fa-network-wired"></i> network scanner</button>
                <button type="button" class="example-tag"><i class="fas fa-key"></i> password cracker</button>
                <button type="button" class="example-tag"><i class="fas fa-shield-virus"></i> vulnerability scanner</button>
                <button type="button" class="example-tag"><i class="fas fa-globe"></i> web application security</button>
                <button type="button" class="example-tag"><i class="fas fa-search"></i> digital forensics</button>
                <button type="button" class="example-tag"><i class="fas fa-user-secret"></i> penetration testing</button>
            </div>
        </div>

        <div class="loading" id="loadingIndicator">
            <div class="spinner"></div>
            <h3><i class="fas fa-crosshairs"></i> Scanning Arsenal...</h3>
            <p>Analyzing cybersecurity tool database</p>
        </div>

        <div class="results-container" id="resultsContainer">
            <div class="results-header">
                <div class="results-count" id="resultsCount" aria-live="polite" aria-atomic="true">Ready to hunt cybersecurity tools</div>
                
            </div>
            <div class="tools-grid" id="toolsGrid">
                <!-- Results will be populated here -->
            </div>
        </div>
    </div>

    <div class="status-bar">
        <div class="status-left">
            <i class="fas fa-terminal"></i> ToolHunt v2.0 - Cybersecurity Arsenal
        </div>
        <div class="status-right">
            <i class="fas fa-shield-alt"></i> Secure • <i class="fas fa-clock"></i> <span id="currentTime"></span>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
